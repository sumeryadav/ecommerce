services:
  - type: web
    name: ecommerce-django
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn ecommerce.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "ecommerce-django.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ecommerce-django.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString

databases:
  - name: ecommerce-db
    plan: free
