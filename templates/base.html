<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fashionam</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font (for Google button) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:500&display=swap" rel="stylesheet">


    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">


</head>

<body class="{% block body_class %}{% endblock %}">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm fixed-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Fashionam</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <div class="mx-auto">
                    <form class="d-flex" action="{% url 'search' %}" method="get">
                        <input class="form-control me-2" type="search" name="q" placeholder="Search products..."
                            aria-label="Search" style="width: 350px;">
                        <button class="btn btn-outline-dark" type="submit">
                        <i class="bi bi-search"></i>
                        </button>
                    </form>


                </div>

                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item me-3">
                        <a class="nav-link" href="{% url 'cart' %}">
                            <i class="bi bi-cart3"></i> Cart
                            {% if request.session.cart %}
                            <span class="badge bg-danger">
                                {{ request.session.cart|length }}
                            </span>
                            {% endif %}
                        </a>
                    </li>

                    {% if user.is_authenticated %}
                    <li class="nav-item me-2">
                        <span class="nav-link text-light">
                            Hi, {{ user.username }}
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'signup' %}">Sign Up</a>
                    </li>
                    {% endif %}

                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="container-fluid p-0">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        (() => {
            const forms = document.querySelectorAll('form');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>

</body>

</html>
