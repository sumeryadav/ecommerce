{% load i18n %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Continue with Google</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #323232;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .auth-card {
            background: #ffffff;
            width: 380px;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.953);
            text-align: center;
        }

        .auth-card img {
            width: 70px;
            margin-bottom: 15px;
        }

        .auth-card h2 {
            margin: 10px 0;
            font-size: 22px;
            font-weight: 600;
        }

        .auth-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .continue-btn {
            width: 100%;
            height: 45px;
            border-radius: 25px;
            border: none;
            background: #1f2933;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }

        .continue-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgb(0, 0, 0);
        }

        .cancel-link {
            display: inline-block;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            text-decoration: none;
        }

        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="auth-card">
    <img src="{% static 'images/google.png' %}" alt="Google">
    <h2>Continue with Google</h2>

    <p>
        You’re about to sign in to <strong>Fashionam</strong> using your Google account.
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="continue-btn">
            Continue
        </button>
    </form>

    <a href="{% url 'account_login' %}" class="cancel-link">
        Cancel & go back
    </a>
</div>

</body>
</html>
